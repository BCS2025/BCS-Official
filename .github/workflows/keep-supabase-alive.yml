name: Keep Supabase Alive

# Supabase 免費方案連續 7 天無活動會 auto-pause。
# 每日 ping 一次 products 表，確保專案保持活躍、使用者不會遇到冷啟動。

on:
  schedule:
    # 每天 UTC 03:17 = 台北時間 11:17（避開整點流量高峰）
    - cron: '17 3 * * *'
  # 手動觸發（方便測試）
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is missing."
            exit 1
          fi

          HTTP_CODE=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --max-time 30 \
            "$SUPABASE_URL/rest/v1/products?select=id&limit=1")

          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.txt

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Supabase ping failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Supabase is alive."
